# IKUSA Compliance Scanner - full stack for one-command demo.
#
# Three services:
#   - mobsf:  static APK analysis (REST API on :8000).
#             MOBSF_API_KEY is injected via env, so the REST key is fixed
#             instead of regenerated on every container recreate. The app
#             reads the same value from .env, so the two are guaranteed
#             to match.
#   - ollama: local LLM runtime (:11434). Model lives in the named volume
#             so a `docker compose down` does not lose the multi-GB download.
#   - app:    FastAPI service (:9787). Self-contained: bundles WeasyPrint,
#             no external Docker call for PDF rendering. Waits for mobsf
#             and ollama to be healthy before starting.

services:
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: ikusa-mobsf
    environment:
      MOBSF_API_KEY: ${MOBSF_API_KEY:?MOBSF_API_KEY must be set in .env}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  ollama:
    image: ollama/ollama:latest
    container_name: ikusa-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  app:
    image: ikusa-app:latest
    build: .
    container_name: ikusa-app
    depends_on:
      mobsf:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      MOBSF_URL: http://mobsf:8000
      MOBSF_API_KEY: ${MOBSF_API_KEY:?MOBSF_API_KEY must be set in .env}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SCAN_STORAGE: /var/lib/ikusa/scans
    ports:
      - "9787:9787"
    volumes:
      - ikusa-scans:/var/lib/ikusa/scans
    restart: unless-stopped

volumes:
  ollama-data:
  ikusa-scans:
